id: nomad_qdrant
kind: dependency_app
display:
  name: Qdrant Vector Store
  description: Vector database dependency for the Knowledge Base.
  icon: IconDatabase
  powered_by: Qdrant
  order: 20
  ui_location: control_room
runtime:
  image: qdrant/qdrant:v1.13.4
  ports:
    - host: 6333
      container: 6333
  mounts:
    - source: ${NOMAD_STORAGE_PATH}/qdrant
      target: /qdrant/storage
  restart: unless-stopped
network:
  join: project-nomad_default
storage:
  requires:
    - storage/qdrant
dependencies: []
healthcheck:
  type: http
  target: http://{container_name}:6333/healthz
hooks: {}
updates:
  strategy: image_tag
permissions:
  docker_socket: false
capabilities:
  internet_required_for_install: true
docs:
  slug: app-qdrant
tests:
  smoke: apps/qdrant/tests/test_smoke.py
