id: nomad_kolibri
kind: sibling_app
display:
  name: Kolibri
  description: Offline education platform.
  icon: IconSchool
  powered_by: Kolibri
  order: 60
  ui_location: bridge
runtime:
  image: learningequality/kolibri:latest
  ports:
    - host: 8085
      container: 8080
  mounts:
    - source: ${NOMAD_STORAGE_PATH}/kolibri
      target: /kolibrihome
  restart: unless-stopped
network:
  join: project-nomad_default
storage:
  requires:
    - storage/kolibri
dependencies: []
healthcheck:
  type: http
  target: http://{container_name}:8080
hooks: {}
updates:
  strategy: image_tag
permissions:
  docker_socket: false
capabilities:
  internet_required_for_install: true
docs:
  slug: app-kolibri
tests:
  smoke: apps/kolibri/tests/test_smoke.py
